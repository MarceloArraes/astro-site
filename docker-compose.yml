services:
  app:
    # Use an environment variable for the image tag if possible (see note below)
    image: "ghcr.io/marceloarraes/astro-site:${IMAGE_TAG:-latest}"

    # Make the container name dynamic based on the environment
    container_name: astro-site-${APP_ENV:-prod}

    pull_policy: always
    ports:
      # Use an environment variable for the host port, fallback to 4690
      - "${HOST_PORT:-4690}:80"
    restart: unless-stopped
